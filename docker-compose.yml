    depends_on:
      mysql-detalle-pedido:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8085:8085"

  ms-pagos:
    build: ./ms-pagos
    depends_on:
      mysql-pagos:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8086:8086"

  ms-despachos:
    build: ./ms-despachos
    depends_on:
      mysql-despachos:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8087:8087"

  ms-usuarios:
    build: ./ms-usuarios
    depends_on:
      mysql-usuarios:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8088:8088"

  ms-reclamos:
    build: ./ms-reclamos
    depends_on:
       mysql-reclamos:
          condition: service_healthy
       eureka-server:
          condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8089:8089"

  ms-notificaciones:
    build: ./ms-notificaciones
    depends_on:
      mysql-notificaciones:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8090:8090"

volumes:
  mysql-clientes-data:
  mysql-productos-data:
  mysql-inventario-data:
  mysql-pedidos-data:
  mysql-detalle-pedido-data:
  mysql-pagos-data:
  mysql-despachos-data:
  mysql-usuarios-data:
  mysql-reclamos-data:
  mysql-notificaciones-data: